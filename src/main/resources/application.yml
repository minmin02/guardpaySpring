spring:
  application:
    name: guardpay

  profiles:
    active: local   # 기본 활성 프로파일: local

---
jwt:
  secret-key: V293ISB0aGlzIGlzIGEgdmVyeSBsb25nIGFuZCBzZWN1cmUgc2VjcmV0IGtleSBmb3IgSldUIGVuY29kaW5nLiBEbyBub3Qgc2hhcmUgaXQgd2l0aCBhbnlvbmUh
  access-token-validity-in-seconds: 3600
  refresh-token-validity-in-seconds: 604800

---

spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:mysql://localhost:3306/guardpay?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: root
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

---

spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:mysql://prod-db-server:3306/guardpay?useSSL=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: prod_user
    password: prod_password

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

---

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    display-request-duration: true
